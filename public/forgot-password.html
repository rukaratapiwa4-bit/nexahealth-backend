
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NexaHealth · Forgot Password</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif; }
    body { background:#f2f5f9; min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px; }
    .card { max-width:420px; width:100%; background:#fff; border-radius:32px; box-shadow:0 12px 40px rgba(0,0,0,0.06),0 4px 12px rgba(0,0,0,0.03); padding:40px 32px 36px; }
    .brand { text-align:center; margin-bottom:28px; }
    .brand h1 { font-size:28px; font-weight:600; letter-spacing:-0.3px; color:#0b2b44; }
    .brand h1 span { color:#0088cc; }
    .brand p { font-size:15px; color:#6b7a8f; margin-top:6px; }
    .form-title { font-size:22px; font-weight:600; color:#0b2b44; text-align:center; margin-bottom:10px; }
    .form-desc { font-size:14px; color:#6b7a8f; text-align:center; margin-bottom:26px; line-height:1.6; }
    .field { margin-bottom:18px; }
    .field label { display:block; font-size:14px; font-weight:500; color:#1e2f3f; margin-bottom:5px; }
    .input-wrap { display:flex; align-items:center; background:#f7f9fc; border:1.5px solid #e6edf4; border-radius:14px; transition:border .2s,background .2s; padding:0 4px 0 14px; }
    .input-wrap:focus-within { border-color:#0088cc; background:#fff; box-shadow:0 0 0 3px rgba(0,136,204,0.08); }
    .input-wrap i { color:#8a9aa8; font-size:16px; min-width:20px; margin-right:6px; }
    .input-wrap input { width:100%; border:none; background:transparent; padding:14px 10px 14px 4px; font-size:15px; color:#162b3a; outline:none; }
    .btn-primary { width:100%; background:#0088cc; border:none; border-radius:16px; padding:16px 12px; font-size:16px; font-weight:600; color:#fff; display:flex; align-items:center; justify-content:center; gap:10px; cursor:pointer; transition:background .2s,transform .1s; margin-top:6px; }
    .btn-primary:hover { background:#0073b0; }
    .btn-primary:active { transform:scale(0.98); }
    .btn-primary:disabled { background:#a0c8e5; cursor:not-allowed; }
    .footer-links { text-align:center; margin-top:22px; font-size:14px; }
    .footer-links a { color:#0088cc; text-decoration:none; font-weight:500; }
    .footer-links a:hover { text-decoration:underline; }
    /* inline message */
    .msg { font-size:13px; margin-top:14px; text-align:center; padding:12px 14px; border-radius:10px; display:none; }
    .msg.error   { background:#fff0ee; color:#c0392b; border:1px solid #f5c6c2; display:block; }
    .msg.success { background:#eafaf4; color:#1e9b6e; border:1px solid #b2e8d4; display:block; }
    /* countdown */
    .countdown-wrap { background:#eff8ff; border:1.5px solid #bee3f8; border-radius:14px; padding:20px; text-align:center; margin-top:16px; display:none; }
    .countdown-wrap.show { display:block; }
    .countdown-wrap i { font-size:36px; color:#0088cc; margin-bottom:10px; display:block; }
    .countdown-wrap h3 { font-size:16px; font-weight:600; color:#0b2b44; margin-bottom:6px; }
    .countdown-wrap p { font-size:14px; color:#6b7a8f; line-height:1.6; margin-bottom:14px; }
    .countdown-timer { font-size:28px; font-weight:700; color:#0088cc; font-variant-numeric:tabular-nums; }
    .countdown-sub { font-size:12px; color:#8a9aa8; margin-top:4px; }
  </style>
</head>
<body>
<div class="card">
  <div class="brand">
    <h1>Nexa<span>Health</span></h1>
    <p>Connect. Order. Deliver.</p>
  </div>
  <div class="form-title">Forgot Password?</div>
  <div class="form-desc">Enter your account email and we'll send you a reset link.</div>

  <!-- FORM — always visible -->
  <div id="formSection">
    <div class="field">
      <label for="forgotEmail">Email Address</label>
      <div class="input-wrap">
        <i class="fas fa-envelope"></i>
        <input type="email" id="forgotEmail" placeholder="you@example.com" required>
      </div>
    </div>
    <div id="formMsg" class="msg"></div>
    <button id="sendBtn" class="btn-primary" onclick="handleForgot()">
      <i class="fas fa-paper-plane"></i> Send Reset Link
    </button>
  </div>

  <!-- COUNTDOWN — shown after email sent, auto-hides after 3 min -->
  <div class="countdown-wrap" id="countdownWrap">
    <i class="fas fa-envelope-open-text"></i>
    <h3>Reset link sent!</h3>
    <p>Check your inbox at <strong id="sentTo"></strong>. The link expires in:</p>
    <div class="countdown-timer" id="timer">3:00</div>
    <div class="countdown-sub">You can send another link once the timer ends.</div>
  </div>

  <div class="footer-links">
    <a href="/"><i class="fas fa-arrow-left" style="margin-right:4px;"></i>Back to Login</a>
  </div>
</div>

<script>
  const API_URL = '/api/auth';
  let countdownInterval = null;

  function showMsg(type, text) {
    const el = document.getElementById('formMsg');
    el.textContent = text;
    el.className = 'msg ' + type;
  }
  function clearMsg() {
    const el = document.getElementById('formMsg');
    el.textContent = '';
    el.className = 'msg';
  }
  function setLoading(loading) {
    const btn = document.getElementById('sendBtn');
    btn.disabled = loading;
    btn.innerHTML = loading
      ? '<i class="fas fa-spinner fa-spin"></i> Sending...'
      : '<i class="fas fa-paper-plane"></i> Send Reset Link';
  }

  function startCountdown(seconds) {
    const timerEl = document.getElementById('timer');
    const btn     = document.getElementById('sendBtn');
    const wrap    = document.getElementById('countdownWrap');

    // Disable send button and show countdown
    btn.disabled = true;
    wrap.classList.add('show');

    let remaining = seconds;

    function tick() {
      const m = Math.floor(remaining / 60);
      const s = remaining % 60;
      timerEl.textContent = `${m}:${s.toString().padStart(2, '0')}`;
      if (remaining <= 0) {
        clearInterval(countdownInterval);
        // Timer done — re-enable form, hide countdown
        btn.disabled = false;
        wrap.classList.remove('show');
        clearMsg();
        // Clear and refocus email field ready for retry
        document.getElementById('forgotEmail').value = '';
        document.getElementById('forgotEmail').focus();
      }
      remaining--;
    }
    tick();
    countdownInterval = setInterval(tick, 1000);
  }

  async function handleForgot() {
    clearMsg();
    const email = document.getElementById('forgotEmail').value.trim();
    if (!email) { showMsg('error', '❌ Please enter your email address.'); return; }
    if (!/\S+@\S+\.\S+/.test(email)) { showMsg('error', '❌ Please enter a valid email address.'); return; }

    setLoading(true);
    try {
      const res  = await fetch(`${API_URL}/forgot-password`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email }),
      });
      const data = await res.json();

      if (data.success) {
        // Show who we sent to
        document.getElementById('sentTo').textContent = email;
        // Start 3-minute (180s) countdown — matches token expiry
        startCountdown(180);
      } else {
        showMsg('error', '❌ ' + (data.message || 'Something went wrong. Please try again.'));
        setLoading(false);
      }
    } catch {
      showMsg('error', '❌ Cannot reach the server. Please try again.');
      setLoading(false);
    }
  }

  // Allow Enter key
  document.getElementById('forgotEmail').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') handleForgot();
  });
</script>
</body>
</html>
