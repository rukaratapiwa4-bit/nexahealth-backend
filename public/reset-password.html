<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password – NexaHealth</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <style>
    * { margin:0; padding:0; box-sizing:border-box; font-family:'Inter',Arial,sans-serif; }
    body { background:#f2f5f9; min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px; }
    .card { max-width:420px; width:100%; background:#fff; border-radius:32px; box-shadow:0 12px 40px rgba(0,0,0,0.07); padding:40px 32px; }
    .brand { text-align:center; margin-bottom:28px; }
    .brand h1 { font-size:26px; font-weight:700; color:#0b2b44; }
    .brand h1 span { color:#0088cc; }
    .brand p { font-size:14px; color:#6b7a8f; margin-top:6px; }
    .form-title { font-size:20px; font-weight:600; color:#0b2b44; text-align:center; margin-bottom:8px; }
    .form-sub { font-size:14px; color:#6b7a8f; text-align:center; margin-bottom:24px; line-height:1.6; }
    .field { margin-bottom:18px; }
    .field label { display:block; font-size:14px; font-weight:500; color:#1e2f3f; margin-bottom:5px; }
    .field label .req { color:#d14545; margin-left:2px; }
    .input-wrap { display:flex; align-items:center; background:#f7f9fc; border:1.5px solid #e6edf4; border-radius:14px; padding:0 4px 0 14px; }
    .input-wrap:focus-within { border-color:#0088cc; background:#fff; box-shadow:0 0 0 3px rgba(0,136,204,0.08); }
    .input-wrap i { color:#8a9aa8; font-size:16px; min-width:20px; margin-right:6px; }
    .input-wrap input { width:100%; border:none; background:transparent; padding:14px 10px 14px 4px; font-size:15px; color:#162b3a; outline:none; }
    .input-wrap .toggle-pass { background:transparent; border:none; padding:0 14px 0 6px; font-size:16px; color:#8a9aa8; cursor:pointer; }
    .input-wrap .toggle-pass:hover { color:#1e2f3f; }
    .btn-primary { width:100%; background:#0088cc; border:none; border-radius:16px; padding:15px 12px; font-size:15px; font-weight:600; color:#fff; display:flex; align-items:center; justify-content:center; gap:10px; cursor:pointer; transition:background .2s; margin-top:4px; }
    .btn-primary:hover { background:#0073b0; }
    .btn-primary:active { transform:scale(.98); }
    .btn-primary:disabled { background:#a0c8e5; cursor:not-allowed; }
    .footer-links { text-align:center; margin-top:20px; font-size:14px; color:#5f6f80; }
    .footer-links a { color:#0088cc; text-decoration:none; font-weight:500; }
    .footer-links a:hover { text-decoration:underline; }
    .msg { font-size:13px; margin-top:14px; text-align:center; padding:12px 16px; border-radius:10px; display:none; }
    .msg.success { background:#eafaf4; color:#1e9b6e; border:1px solid #b2e8d4; display:block; }
    .msg.error   { background:#fff0ee; color:#c0392b; border:1px solid #f5c6c2; display:block; }
    .hidden { display:none !important; }
    .strength-bar { height:5px; border-radius:4px; background:#e6edf4; margin-top:8px; overflow:hidden; }
    .strength-fill { height:100%; border-radius:4px; transition:width .3s, background .3s; width:0; }
    .strength-text { font-size:12px; color:#8a9aa8; margin-top:4px; }
  </style>
</head>
<body>
<div class="card">
  <div class="brand">
    <h1>Nexa<span>Health</span></h1>
    <p>Set new password</p>
  </div>
  <div class="form-title">Reset Password</div>

  <div id="formSection">
    <p class="form-sub">Choose a strong password with at least 8 characters.</p>

    <div class="field">
      <label for="newPassword">New Password <span class="req">*</span></label>
      <div class="input-wrap">
        <i class="fas fa-lock"></i>
        <input type="password" id="newPassword" placeholder="Min 8 characters" oninput="checkStrength(this.value)">
        <button type="button" class="toggle-pass" onclick="togglePass('newPassword', this)">
          <i class="fas fa-eye"></i>
        </button>
      </div>
      <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
      <div class="strength-text" id="strengthText"></div>
    </div>

    <div class="field">
      <label for="confirmPasswordReset">Confirm Password <span class="req">*</span></label>
      <div class="input-wrap">
        <i class="fas fa-check-circle"></i>
        <input type="password" id="confirmPasswordReset" placeholder="Confirm your password">
        <button type="button" class="toggle-pass" onclick="togglePass('confirmPasswordReset', this)">
          <i class="fas fa-eye"></i>
        </button>
      </div>
    </div>

    <button class="btn-primary" id="submitBtn" onclick="handleResetPassword()">
      <i class="fas fa-key"></i> Reset Password
    </button>

    <div class="msg" id="msgBox"></div>

    <div class="footer-links">
      <a href="/"><i class="fas fa-arrow-left" style="margin-right:4px;"></i>Back to Login</a>
    </div>
  </div>

  <!-- Success state -->
  <div id="successSection" class="hidden">
    <div class="success-icon">✅</div>
    <div class="form-title">Password Reset!</div>
    <p class="form-sub">Your password has been updated successfully. Redirecting to login…</p>
  </div>
</div>

<script>
  // ===== API URL – RELATIVE PATH =====
  const API_URL = '/api/auth';

  // ===== GET TOKEN FROM URL =====
  const token = new URLSearchParams(window.location.search).get('token');

  if (!token) {
    document.getElementById('formSection').innerHTML = `
      <div style="text-align:center;padding:20px 0;">
        <div style="font-size:52px;margin-bottom:16px;">⏰</div>
        <div class="form-title">Link Expired or Invalid</div>
        <p class="form-sub">This password reset link is invalid or has already expired. Please request a new one.</p>
        <a href="/forgot-password.html" style="display:inline-block;background:#0088cc;color:#fff;text-decoration:none;padding:13px 28px;border-radius:14px;font-size:15px;font-weight:600;margin-top:8px;">
          <i class="fas fa-redo"></i> Request New Link
        </a>
      </div>
    `;
  }

  function togglePass(id, btn) {
    const inp = document.getElementById(id);
    const icon = btn.querySelector('i');
    if (inp.type === 'password') {
      inp.type = 'text';
      icon.classList.remove('fa-eye');
      icon.classList.add('fa-eye-slash');
    } else {
      inp.type = 'password';
      icon.classList.remove('fa-eye-slash');
      icon.classList.add('fa-eye');
    }
  }

  function checkStrength(val) {
    const fill = document.getElementById('strengthFill');
    const text = document.getElementById('strengthText');
    let score = 0;
    if (val.length >= 8) score++;
    if (/[A-Z]/.test(val)) score++;
    if (/[0-9]/.test(val)) score++;
    if (/[^A-Za-z0-9]/.test(val)) score++;

    const levels = [
      { w:'0%', bg:'#e6edf4', label:'' },
      { w:'25%', bg:'#e74c3c', label:'Weak' },
      { w:'50%', bg:'#e67e22', label:'Fair' },
      { w:'75%', bg:'#f1c40f', label:'Good' },
      { w:'100%', bg:'#1e9b6e', label:'Strong' },
    ];
    const lvl = val.length === 0 ? levels[0] : levels[score] || levels[1];
    fill.style.width = lvl.w;
    fill.style.background = lvl.bg;
    text.textContent = lvl.label;
    text.style.color = lvl.bg;
  }

  async function handleResetPassword() {
    const password = document.getElementById('newPassword').value;
    const confirmPassword = document.getElementById('confirmPasswordReset').value;
    const msgBox = document.getElementById('msgBox');
    const btn = document.getElementById('submitBtn');

    msgBox.className = 'msg';
    msgBox.textContent = '';

    if (password.length < 8) {
      msgBox.textContent = '❌ Password must be at least 8 characters.';
      msgBox.className = 'msg error';
      return;
    }
    if (password !== confirmPassword) {
      msgBox.textContent = '❌ Passwords do not match.';
      msgBox.className = 'msg error';
      return;
    }
    if (!token) {
      msgBox.textContent = '❌ Invalid or missing reset token.';
      msgBox.className = 'msg error';
      return;
    }

    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Resetting…';

    try {
      const res = await fetch(`${API_URL}/reset-password/${token}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password, confirmPassword }),
      });
      const data = await res.json();

      if (data.success) {
        document.getElementById('formSection').classList.add('hidden');
        document.getElementById('successSection').classList.remove('hidden');
        setTimeout(() => { window.location.href = '/'; }, 2500);
      } else {
        msgBox.textContent = '❌ ' + (data.message || 'Reset failed.');
        msgBox.className = 'msg error';
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-key"></i> Reset Password';
      }
    } catch (err) {
      msgBox.textContent = '❌ Server error. Please try again.';
      msgBox.className = 'msg error';
      btn.disabled = false;
      btn.innerHTML = '<i class="fas fa-key"></i> Reset Password';
    }
  }
</script>
</body>
</html>
